<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Expense Tracker</title>
    <style>
        :root {
            --primary: #4f46e5;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { margin-bottom: 5px; color: var(--primary); }

        .personal-budgets {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .budget-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            text-align: center;
        }

        .budget-card h2 { margin-top: 0; color: var(--text-muted); font-size: 1.1rem; }
        .amount { font-size: 2rem; font-weight: bold; margin: 10px 0; color: var(--primary); }

        .interactive-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .personal-budgets, .interactive-section {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background: #4338ca; }
        
        .btn-reset {
            background: #ef4444;
            margin-top: 15px;
        }
        .btn-reset:hover { background: #dc2626; }

        .category-list {
            max-height: 320px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .category-item:last-child { border-bottom: none; }
        
        .cat-name { font-weight: 500; }
        .cat-remaining { font-weight: bold; }
        .cat-total { font-size: 0.85rem; color: var(--text-muted); }

        .history-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-list li {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Trip Expense Tracker</h1>
        <p>Total Estimated Budget: Rs. 153,500</p>
    </header>

    <div class="personal-budgets">
        <div class="budget-card">
            <h2>Me (Remaining Balance)</h2>
            <div class="amount" id="my-budget">Rs. 76,750</div>
        </div>
        <div class="budget-card">
            <h2>Girlfriend (Remaining Balance)</h2>
            <div class="amount" id="gf-budget">Rs. 76,750</div>
        </div>
    </div>

    <div class="interactive-section">
        <div class="card">
            <h3>Log a Payment</h3>
            <div class="form-group">
                <label for="payer">Who Paid?</label>
                <select id="payer">
                    <option value="me">Me</option>
                    <option value="gf">Girlfriend</option>
                </select>
            </div>
            <div class="form-group">
                <label for="category">Expense Category</label>
                <select id="category"></select>
            </div>
            <div class="form-group">
                <label for="amount">Amount (LKR)</label>
                <input type="number" id="amount" placeholder="e.g. 1000" min="1">
            </div>
            <button onclick="addPayment()">Deduct Payment</button>
            <button class="btn-reset" onclick="resetData()">Reset All Data</button>
        </div>

        <div class="card">
            <h3>Category Breakdown</h3>
            <div class="category-list" id="category-container"></div>
        </div>
    </div>

    <div class="history-card">
        <h3>Transaction History</h3>
        <ul id="history-log" class="history-list"></ul>
    </div>
</div>

<script>
    // Initializing standard categories and base amounts
    const baseCategories = {
        "Hotel (24)": 17500,
        "Photo": 19000,
        "Food": 20000,
        "Fuel": 25000,
        "Extra": 5000,
        "Bus": 2000,
        "Conversation expenses": 10000,
        "Podi un": 12000,
        "Thursday": 8000,
        "Friday": 5000,
        "Saturday": 10000,
        "Sunday": 5000,
        "Couple meal": 15000
    };

    const initialPersonalBudget = 76750;

    // Load data from localStorage or set defaults
    let currentState = JSON.parse(localStorage.getItem('tripData')) || {
        meRemaining: initialPersonalBudget,
        gfRemaining: initialPersonalBudget,
        categories: { ...baseCategories },
        history: []
    };

    function saveData() {
        localStorage.setItem('tripData', JSON.stringify(currentState));
        render();
    }

    function populateDropdown() {
        const select = document.getElementById('category');
        select.innerHTML = '';
        Object.keys(baseCategories).forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            select.appendChild(opt);
        });
    }

    function render() {
        // Render Personal Budgets
        document.getElementById('my-budget').textContent = `Rs. ${currentState.meRemaining.toLocaleString()}`;
        document.getElementById('gf-budget').textContent = `Rs. ${currentState.gfRemaining.toLocaleString()}`;

        // Render Categories
        const container = document.getElementById('category-container');
        container.innerHTML = '';
        Object.keys(baseCategories).forEach(cat => {
            const remaining = currentState.categories[cat];
            const total = baseCategories[cat];
            
            const item = document.createElement('div');
            item.className = 'category-item';
            item.innerHTML = `
                <div>
                    <div class="cat-name">${cat}</div>
                    <div class="cat-total">Original: Rs. ${total.toLocaleString()}</div>
                </div>
                <div class="cat-remaining" style="color: ${remaining <= 0 ? '#ef4444' : 'var(--text-main)'}">
                    Rs. ${remaining.toLocaleString()}
                </div>
            `;
            container.appendChild(item);
        });

        // Render Logs
        const logContainer = document.getElementById('history-log');
        logContainer.innerHTML = '';
        if(currentState.history.length === 0) {
            logContainer.innerHTML = '<li style="color: var(--text-muted)">No payments logged yet.</li>';
        } else {
            currentState.history.slice().reverse().forEach(log => {
                const li = document.createElement('li');
                li.textContent = log;
                logContainer.appendChild(li);
            });
        }
    }

    function addPayment() {
        const payer = document.getElementById('payer').value;
        const category = document.getElementById('category').value;
        const amount = parseFloat(document.getElementById('amount').value);

        if (isNaN(amount) || amount <= 0) {
            alert("Please enter a valid amount.");
            return;
        }

        // Deduct from Category
        currentState.categories[category] -= amount;

        // Deduct from Payer
        const payerName = payer === 'me' ? 'Me' : 'Girlfriend';
        if (payer === 'me') {
            currentState.meRemaining -= amount;
        } else {
            currentState.gfRemaining -= amount;
        }

        // Append to history log
        const timestamp = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        currentState.history.push(`[${timestamp}] ${payerName} paid Rs. ${amount.toLocaleString()} for ${category}`);

        // Clear input field & save
        document.getElementById('amount').value = '';
        saveData();
    }

    function resetData() {
        if (confirm("Are you sure you want to reset all tracking data back to defaults?")) {
            currentState = {
                meRemaining: initialPersonalBudget,
                gfRemaining: initialPersonalBudget,
                categories: { ...baseCategories },
                history: []
            };
            saveData();
        }
    }

    // Initial setup
    populateDropdown();
    render();
</script>

</body>
</html>

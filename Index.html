<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip Expense Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0f172a;
      --navy-2:  #1e293b;
      --navy-3:  #334155;
      --amber:   #f59e0b;
      --amber-2: #fbbf24;
      --teal:    #14b8a6;
      --red:     #f43f5e;
      --green:   #10b981;
      --text:    #f1f5f9;
      --muted:   #94a3b8;
      --border:  rgba(255,255,255,0.08);
      --radius:  14px;
    }

    html { font-size: 15px; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--navy);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 20px 60px;
    }

    /* ── Header ── */
    .site-header {
      max-width: 980px;
      margin: 0 auto 32px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-title { line-height: 1.2; }

    .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--teal);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .header-title h1 {
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--text);
    }

    .total-pill {
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 10px 20px;
      font-size: 0.85rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .total-pill strong { color: var(--amber); font-family: 'DM Mono', monospace; font-size: 1rem; }

    /* ── Budget Split ── */
    .budget-row {
      max-width: 980px;
      margin: 0 auto 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .budget-card {
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      position: relative;
      overflow: hidden;
    }

    .budget-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }

    .budget-card.me::before   { background: var(--amber); }
    .budget-card.gf::before   { background: var(--teal); }

    .budget-card .label {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .budget-amount {
      font-family: 'DM Mono', monospace;
      font-size: 2rem;
      font-weight: 500;
      color: var(--text);
    }

    .budget-amount .currency { font-size: 1rem; color: var(--muted); margin-right: 2px; }

    .budget-spent-bar {
      margin-top: 14px;
      height: 4px;
      border-radius: 4px;
      background: var(--navy-3);
      overflow: hidden;
    }

    .budget-spent-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .me .budget-spent-fill   { background: var(--amber); }
    .gf .budget-spent-fill   { background: var(--teal); }

    .budget-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Main Grid ── */
    .main-grid {
      max-width: 980px;
      margin: 0 auto 24px;
      display: grid;
      grid-template-columns: 1fr 1.3fr;
      gap: 20px;
    }

    /* ── Log Panel ── */
    .log-panel {
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .panel-title {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.82rem; color: var(--muted); font-weight: 500; }

    select, input[type="number"] {
      background: var(--navy-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 10px 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }

    select:focus, input[type="number"]:focus {
      border-color: var(--amber);
    }

    select option { background: var(--navy-2); }

    .payer-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .toggle-btn {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--navy-3);
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      user-select: none;
    }

    .toggle-btn.active-me  { background: rgba(245,158,11,0.15); border-color: var(--amber); color: var(--amber); }
    .toggle-btn.active-gf  { background: rgba(20,184,166,0.15); border-color: var(--teal);  color: var(--teal); }

    .btn-primary {
      width: 100%;
      padding: 13px;
      border-radius: 8px;
      border: none;
      background: var(--amber);
      color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .btn-primary:hover  { background: var(--amber-2); }
    .btn-primary:active { transform: scale(0.98); }

    .btn-reset {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(244,63,94,0.3);
      background: transparent;
      color: var(--red);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-reset:hover { background: rgba(244,63,94,0.08); }

    /* ── Categories Panel ── */
    .categories-panel {
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      overflow: hidden;
    }

    .cat-scroll {
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }

    .cat-scroll::-webkit-scrollbar { width: 4px; }
    .cat-scroll::-webkit-scrollbar-track { background: transparent; }
    .cat-scroll::-webkit-scrollbar-thumb { background: var(--navy-3); border-radius: 4px; }

    .cat-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .cat-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }

    .cat-name { font-size: 0.88rem; font-weight: 500; color: var(--text); }

    .cat-amounts {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .cat-remaining-val {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
    }

    .bar-track {
      height: 5px;
      border-radius: 5px;
      background: var(--navy-3);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 0.5s ease, background 0.3s;
    }

    /* ── History Panel ── */
    .history-panel {
      max-width: 980px;
      margin: 0 auto;
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .history-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-top: 16px;
      max-height: 220px;
      overflow-y: auto;
    }

    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: var(--navy-3); border-radius: 4px; }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .history-item:last-child { border-bottom: none; }

    .hist-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .hist-dot.me  { background: var(--amber); }
    .hist-dot.gf  { background: var(--teal); }

    .hist-body { flex: 1; color: var(--muted); }
    .hist-body strong { color: var(--text); }

    .hist-amount {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      color: var(--text);
      white-space: nowrap;
    }

    .hist-time {
      font-size: 0.72rem;
      color: var(--navy-3);
    }

    .empty-state {
      color: var(--muted);
      font-size: 0.85rem;
      padding: 20px 0;
      text-align: center;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--navy-3);
      color: var(--text);
      padding: 12px 22px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 999;
      white-space: nowrap;
      border: 1px solid var(--border);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .budget-row  { grid-template-columns: 1fr; }
      .main-grid   { grid-template-columns: 1fr; }
      .budget-amount { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="site-header">
  <div class="header-title">
    <div class="eyebrow">Sri Lanka Trip</div>
    <h1>Expense Tracker</h1>
  </div>
  <div class="total-pill">Total Budget &nbsp;<strong id="total-display">Rs. 153,500</strong></div>
</header>

<!-- Budget Split -->
<div class="budget-row">
  <div class="budget-card me">
    <div class="label">Me — Remaining</div>
    <div class="budget-amount"><span class="currency">Rs.</span><span id="me-amount">76,750</span></div>
    <div class="budget-spent-bar"><div class="budget-spent-fill" id="me-bar" style="width:0%"></div></div>
    <div class="budget-meta">
      <span id="me-spent-label">Spent: Rs. 0</span>
      <span id="me-pct">0% used</span>
    </div>
  </div>
  <div class="budget-card gf">
    <div class="label">Girlfriend — Remaining</div>
    <div class="budget-amount"><span class="currency">Rs.</span><span id="gf-amount">76,750</span></div>
    <div class="budget-spent-bar"><div class="budget-spent-fill" id="gf-bar" style="width:0%"></div></div>
    <div class="budget-meta">
      <span id="gf-spent-label">Spent: Rs. 0</span>
      <span id="gf-pct">0% used</span>
    </div>
  </div>
</div>

<!-- Main Grid -->
<div class="main-grid">

  <!-- Log Panel -->
  <div class="log-panel">
    <div class="panel-title">Log a Payment</div>

    <div class="form-group">
      <label>Who paid?</label>
      <div class="payer-toggle">
        <div class="toggle-btn active-me" id="toggle-me" onclick="setPayer('me')">🧑 Me</div>
        <div class="toggle-btn" id="toggle-gf" onclick="setPayer('gf')">💑 Girlfriend</div>
      </div>
    </div>

    <div class="form-group">
      <label for="category">Category</label>
      <select id="category"></select>
    </div>

    <div class="form-group">
      <label for="amount">Amount (LKR)</label>
      <input type="number" id="amount" placeholder="e.g. 1,500" min="1" />
    </div>

    <button class="btn-primary" onclick="addPayment()">→ Record Payment</button>
    <button class="btn-reset" onclick="resetData()">Reset all data</button>
  </div>

  <!-- Categories Panel -->
  <div class="categories-panel">
    <div class="panel-title">Category Breakdown</div>
    <div class="cat-scroll" id="cat-container"></div>
  </div>

</div>

<!-- History -->
<div class="history-panel">
  <div class="panel-title">Transaction History</div>
  <ul class="history-list" id="history-list"></ul>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const BASE = {
    "Hotel (24)":             17500,
    "Photo":                  19000,
    "Food":                   20000,
    "Fuel":                   25000,
    "Extra":                   5000,
    "Bus":                     2000,
    "Conversation expenses":  10000,
    "Podi un":                12000,
    "Thursday":                8000,
    "Friday":                  5000,
    "Saturday":               10000,
    "Sunday":                  5000,
    "Couple meal":            15000,
  };

  const INITIAL = 76750;

  let payer = 'me';

  let state = JSON.parse(localStorage.getItem('tripData_v2')) || {
    meRemaining: INITIAL,
    gfRemaining: INITIAL,
    categories: { ...BASE },
    history: []
  };

  /* ── Payer Toggle ── */
  function setPayer(p) {
    payer = p;
    document.getElementById('toggle-me').className = 'toggle-btn' + (p === 'me' ? ' active-me' : '');
    document.getElementById('toggle-gf').className = 'toggle-btn' + (p === 'gf' ? ' active-gf' : '');
  }

  /* ── Dropdown ── */
  function buildDropdown() {
    const sel = document.getElementById('category');
    sel.innerHTML = '';
    Object.keys(BASE).forEach(k => {
      const o = document.createElement('option');
      o.value = k; o.textContent = k;
      sel.appendChild(o);
    });
  }

  /* ── Render ── */
  function render() {
    const meSpent = INITIAL - state.meRemaining;
    const gfSpent = INITIAL - state.gfRemaining;
    const mePct   = Math.min(100, (meSpent / INITIAL) * 100).toFixed(1);
    const gfPct   = Math.min(100, (gfSpent / INITIAL) * 100).toFixed(1);

    document.getElementById('me-amount').textContent = state.meRemaining.toLocaleString();
    document.getElementById('gf-amount').textContent = state.gfRemaining.toLocaleString();
    document.getElementById('me-bar').style.width    = mePct + '%';
    document.getElementById('gf-bar').style.width    = gfPct + '%';
    document.getElementById('me-spent-label').textContent = `Spent: Rs. ${meSpent.toLocaleString()}`;
    document.getElementById('gf-spent-label').textContent = `Spent: Rs. ${gfSpent.toLocaleString()}`;
    document.getElementById('me-pct').textContent    = `${mePct}% used`;
    document.getElementById('gf-pct').textContent    = `${gfPct}% used`;

    /* categories */
    const container = document.getElementById('cat-container');
    container.innerHTML = '';
    Object.entries(BASE).forEach(([name, total]) => {
      const remaining = state.categories[name];
      const spent = total - remaining;
      const pct = Math.min(100, Math.max(0, (spent / total) * 100));
      const over = remaining < 0;
      const fillColor = over ? '#f43f5e' : pct > 75 ? '#f59e0b' : '#14b8a6';

      const div = document.createElement('div');
      div.className = 'cat-item';
      div.innerHTML = `
        <div class="cat-row">
          <span class="cat-name">${name}</span>
          <span class="cat-amounts">
            <span style="color:${fillColor};font-family:'DM Mono',monospace;font-weight:600;font-size:0.82rem">Rs. ${remaining.toLocaleString()}</span>
            <span style="color:var(--navy-3)"> / ${total.toLocaleString()}</span>
          </span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${fillColor}"></div>
        </div>
      `;
      container.appendChild(div);
    });

    /* history */
    const list = document.getElementById('history-list');
    list.innerHTML = '';
    if (!state.history.length) {
      list.innerHTML = '<li class="empty-state">No payments recorded yet.</li>';
      return;
    }
    [...state.history].reverse().forEach(h => {
      const li = document.createElement('li');
      li.className = 'history-item';
      li.innerHTML = `
        <div class="hist-dot ${h.payer}"></div>
        <div class="hist-body"><strong>${h.payerLabel}</strong> → ${h.category}</div>
        <div class="hist-amount">Rs. ${h.amount.toLocaleString()}</div>
        <div class="hist-time">${h.time}</div>
      `;
      list.appendChild(li);
    });
  }

  /* ── Add Payment ── */
  function addPayment() {
    const category = document.getElementById('category').value;
    const amount   = parseFloat(document.getElementById('amount').value);

    if (!category) return showToast('Select a category.', 'warn');
    if (isNaN(amount) || amount <= 0) return showToast('Enter a valid amount.', 'warn');

    state.categories[category] -= amount;
    if (payer === 'me') state.meRemaining -= amount;
    else                state.gfRemaining -= amount;

    const now = new Date();
    state.history.push({
      payer,
      payerLabel: payer === 'me' ? 'Me' : 'Girlfriend',
      category,
      amount,
      time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    });

    document.getElementById('amount').value = '';
    save();
    showToast(`Rs. ${amount.toLocaleString()} logged for ${category}`);
  }

  /* ── Reset ── */
  function resetData() {
    if (!confirm('Reset all tracking data back to defaults?')) return;
    state = {
      meRemaining: INITIAL,
      gfRemaining: INITIAL,
      categories: { ...BASE },
      history: []
    };
    save();
    showToast('Data reset.');
  }

  /* ── Persist ── */
  function save() {
    localStorage.setItem('tripData_v2', JSON.stringify(state));
    render();
  }

  /* ── Toast ── */
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  /* ── Enter key shortcut ── */
  document.getElementById('amount').addEventListener('keydown', e => {
    if (e.key === 'Enter') addPayment();
  });

  /* ── Boot ── */
  buildDropdown();
  render();
</script>
</body>
</html>
